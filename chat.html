<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #075e54; color: white; padding: 12px; font-weight: bold; text-align: center; }
        #chat-window { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 14px; word-wrap: break-word; }
        .bot-msg { background: #ffffff; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user-msg { background: #dcf8c6; align-self: flex-end; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .chat-img { max-width: 100%; border-radius: 8px; display: block; margin-top: 5px; }
        
        /* --- Preview Box --- */
        #preview-box {
            display: none; 
            padding: 10px;
            background: #fff;
            border-top: 2px solid #075e54;
            position: relative;
            text-align: center;
            min-height: 50px;
        }
        #preview-img { 
            max-height: 150px; 
            max-width: 90%; 
            border-radius: 5px; 
            border: 2px solid #ddd;
            display: inline-block;
        }
        .del-btn {
            position: absolute; top: 5px; right: 10px;
            background: #ff4d4d; color: white; border: none;
            border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold;
            z-index: 10;
        }

        .input-area { display: flex; align-items: center; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .icon-btn { cursor: pointer; font-size: 22px; border: none; background: none; color: #075e54; margin: 0 8px; }
        #image-input { display: none; }
    </style>
</head>
<body>

<div class="header">Support Chat</div>
<div id="chat-window">
    <div class="msg bot-msg">හෙලෝ! පින්තූරයක් තෝරා Preview කර බලන්න.</div>
</div>

<div id="preview-box">
    <button class="del-btn" onclick="clearPreview()">×</button>
    <img id="preview-img" src="" alt="Image Preview">
</div>

<div class="input-area">
    <label for="image-input" class="icon-btn">📷</label>
    <input type="file" id="image-input" accept="image/*">
    <input type="text" id="user-input" placeholder="පණිවිඩය ලියන්න...">
    <button id="send-btn" class="icon-btn" onclick="handleSend()">➤</button>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const imageInput = document.getElementById('image-input');
    const previewBox = document.getElementById('preview-box');
    const previewImg = document.getElementById('preview-img');
    
    let currentBase64 = null;

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                currentBase64 = event.target.result;
                previewImg.src = currentBase64;
                previewBox.style.display = 'block';
                chatWindow.scrollTop = chatWindow.scrollHeight; // Auto scroll
            };
            reader.readAsDataURL(file);
        }
    });

    function clearPreview() {
        currentBase64 = null;
        previewImg.src = "";
        previewBox.style.display = 'none';
        imageInput.value = ""; 
    }

    function addMessage(content, type, isImage = false) {
        const div = document.createElement('div');
        div.className = `msg ${type}-msg`;
        if (isImage) {
            const img = document.createElement('img');
            img.src = content;
            img.className = 'chat-img';
            div.appendChild(img);
        } else {
            div.innerText = content;
        }
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleSend() {
        const text = userInput.value.trim();
        if (currentBase64) {
            addMessage(currentBase64, 'user', true);
            clearPreview();
        }
        if (text) {
            addMessage(text, 'user');
            userInput.value = '';
        }
        if (text || currentBase64) {
            setTimeout(() => addMessage("ඔබේ පණිවිඩය ලැබුණා!", 'bot'), 1000);
        }
    }
</script>
</body>
</html>
