<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .chat-header {
            background: #4189ff;
            color: white;
            padding: 12px;
            font-weight: bold;
            text-align: center;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #chat-window {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
        }

        #msg-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 75%;
            font-size: 14px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .bot-msg { background: #ffffff; align-self: flex-start; }
        .user-msg { background: #dcf8c6; align-self: flex-end; }

        .chat-img { max-width: 100%; border-radius: 8px; display: block; margin-top: 5px; width:180px;}
        
        .file-msg {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 8px;
            color: #4189ff;
            font-weight: 500;
        }

        .pdf-icon { color: #e74c3c; font-size: 20px; }
        .generic-file-icon { color: #7f8c8d; font-size: 20px; }

        #preview-box {
            display: none;
            padding: 12px;
            background: #fff;
            border-top: 2px solid #4189ff;
            text-align: center;
            position: relative;
        }

        #preview-content { font-size: 13px; color: #333; margin-top: 5px; font-weight: 600; }

        #preview-img {
            max-height: 100px;
            border-radius: 5px;
            border: 1px solid #ddd;
            display: none;
            margin: 0 auto 5px;
        }

        .del-btn {
            position: absolute; top: 8px; right: 15px;
            background: #ff4d4d; color: white; border: none;
            border-radius: 50%; cursor: pointer; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
        }

        .input-area {
            display: flex; align-items: center; padding: 10px;
            background: #f0f0f0; border-top: 1px solid #ddd;
        }

        #user-input {
            flex: 1; padding: 10px 15px; border: 1px solid #ccc;
            border-radius: 20px; outline: none; margin-left: 5px;
        }

        .icon-btn {
            cursor: pointer; font-size: 20px; border: none;
            background: none; color: #4189ff; margin: 0 5px;
            transition: 0.2s;
        }

        .icon-btn:hover { color: #128c7e; transform: scale(1.1); }
        #file-input { display: none; }
    </style>
</head>

<body>

    <div class="chat-header">Customer Support</div>

    <div id="chat-window">
        <div id="msg-list">
            <div class="msg bot-msg">Welcome! Please select an image or file to start.</div>
        </div>
    </div>

    <div id="preview-box">
        <button class="del-btn" onclick="clearPreview()"><i class="fas fa-times"></i></button>
        <img id="preview-img" src="">
        <div id="preview-content"></div>
    </div>

    <div class="input-area">
        <label for="file-input" class="icon-btn" title="Attach File">
            <i class="fas fa-paperclip"></i>
        </label>
        <input type="file" id="file-input">
        
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        
        <button id="send-btn" class="icon-btn" onclick="handleSend()" title="Send Message">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const msgList = document.getElementById('msg-list');
        const uInput = document.getElementById('user-input');
        const fInput = document.getElementById('file-input');
        const pBox = document.getElementById('preview-box');
        const pImg = document.getElementById('preview-img');
        const pText = document.getElementById('preview-content');

        let currentFile = null;

        fInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                pBox.style.display = 'block';
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pImg.src = ev.target.result;
                        pImg.style.display = 'block';
                        pText.innerText = file.name;
                    };
                    reader.readAsDataURL(file);
                } else {
                    pImg.style.display = 'none';
                    let icon = file.type === "application/pdf" ? "fa-file-pdf pdf-icon" : "fa-file generic-file-icon";
                    pText.innerHTML = `<i class="fas ${icon}" style="font-size: 24px;"></i><br>${file.name}`;
                }
            }
        };

        function clearPreview() {
            currentFile = null;
            pBox.style.display = 'none';
            fInput.value = "";
        }

        function addMessage(content, type, isFile = false, fileName = "", fileType = "") {
            const div = document.createElement('div');
            div.className = `msg ${type}-msg`;
            
            if (isFile) {
                // Image handling
                if (content.startsWith('data:image/')) {
                    const img = document.createElement('img');
                    img.src = content;
                    img.className = 'chat-img';
                    div.appendChild(img);
                } else {
                    // PDF or other file handling
                    const fileBubble = document.createElement('div');
                    fileBubble.className = 'file-msg';
                    let iconClass = fileType === "application/pdf" ? "fa-file-pdf pdf-icon" : "fa-file generic-file-icon";
                    fileBubble.innerHTML = `<i class="fas ${iconClass}"></i> <span>${fileName}</span>`;
                    div.appendChild(fileBubble);
                }
            } else {
                div.innerText = content;
            }
            
            msgList.appendChild(div);
            // Auto scroll to bottom
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        function handleSend() {
            const val = uInput.value.trim();
            
            // Check if there is a file or text
            if (!val && !currentFile) return;

            // Send File if exists
            if (currentFile) {
                const reader = new FileReader();
                const fName = currentFile.name;
                const fType = currentFile.type;
                reader.onload = (ev) => {
                    addMessage(ev.target.result, 'user', true, fName, fType);
                    clearPreview();
                };
                reader.readAsDataURL(currentFile);
            }

            // Send Text if exists
            if (val) {
                addMessage(val, 'user');
                uInput.value = '';
            }

            // Bot Auto Response
            setTimeout(() => {
                addMessage("Message received! Thank you.", "bot");
            }, 1000);
        }

        uInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSend();
            }
        });
    </script>

</body>
</html>
