<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #075e54; color: white; padding: 12px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 100; }
        
        /* --- මෙතන තමයි Bottom to Top හැදෙන්නේ --- */
        #chat-window { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; /* Messages එකින් එක පල්ලෙහ්ට එන්න */
            gap: 10px;
        }
        
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 14px; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bot-msg { background: #ffffff; align-self: flex-start; }
        .user-msg { background: #dcf8c6; align-self: flex-end; }
        .chat-img { max-width: 100%; border-radius: 8px; display: block; margin-top: 5px; }
        
        #preview-box { display: none; padding: 10px; background: #fff; border-top: 2px solid #075e54; position: relative; text-align: center; }
        #preview-img { max-height: 120px; max-width: 80%; border-radius: 5px; border: 1px solid #ddd; }
        .del-btn { position: absolute; top: 5px; right: 15px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold; }

        .input-area { display: flex; align-items: center; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        #user-input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .icon-btn { cursor: pointer; font-size: 22px; border: none; background: none; color: #075e54; margin: 0 8px; }
        #image-input { display: none; }
    </style>
</head>
<body>

<div class="header">Support Chat</div>

<div id="chat-window">
    <div class="msg bot-msg">හෙලෝ! ඔබට උදව් කරන්නේ කොහොමද?</div>
</div>

<div id="preview-box">
    <button class="del-btn" onclick="clearPreview()">×</button>
    <img id="preview-img" src="" alt="Preview">
</div>

<div class="input-area">
    <label for="image-input" class="icon-btn">📷</label>
    <input type="file" id="image-input" accept="image/*">
    <input type="text" id="user-input" placeholder="පණිවිඩය ලියන්න..." autocomplete="off">
    <button id="send-btn" class="icon-btn" onclick="handleSend()">➤</button>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const imageInput = document.getElementById('image-input');
    const previewBox = document.getElementById('preview-box');
    const previewImg = document.getElementById('preview-img');
    
    let currentBase64 = null;

    // හැමතිස්සෙම අලුත් මැසේජ් එක පේන්න පල්ලෙහ්ට scroll කරන එක
    function scrollToBottom() {
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentBase64 = ev.target.result;
                previewImg.src = currentBase64;
                previewBox.style.display = 'block';
                scrollToBottom();
            };
            reader.readAsDataURL(file);
        }
    });

    function clearPreview() {
        currentBase64 = null;
        previewImg.src = "";
        previewBox.style.display = 'none';
        imageInput.value = ""; 
    }

    function addMessage(content, type, isImage = false) {
        const div = document.createElement('div');
        div.className = `msg ${type}-msg`;
        if (isImage) {
            const img = document.createElement('img');
            img.src = content;
            img.className = 'chat-img';
            img.onload = scrollToBottom;
            div.appendChild(img);
        } else {
            div.innerText = content;
        }
        chatWindow.appendChild(div);
        scrollToBottom();
    }

    function handleSend() {
        const text = userInput.value.trim();
        if (!text && !currentBase64) return;

        if (currentBase64) {
            addMessage(currentBase64, 'user', true);
            clearPreview();
        }
        if (text) {
            addMessage(text, 'user');
            userInput.value = '';
        }
        
        setTimeout(() => addMessage("ඔබේ පණිවිඩය ලැබුණා!", 'bot'), 1000);
    }

    // --- Enter Key එක වැඩ කරන විදිහ ---
    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // Browser එක refresh වීම නවත්වයි
            handleSend();
        }
    });

    // මුලින්ම load වෙද්දී පල්ලෙහ්ටම scroll වෙලා තියෙන්න
    window.onload = scrollToBottom;
</script>

</body>
</html>
