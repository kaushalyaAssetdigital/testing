<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: #075e54;
            color: white;
            padding: 12px;
            font-weight: bold;
            text-align: center;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* --- Chat window logic for bottom-to-top appearance --- */
        #chat-window {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
        }

        #msg-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 75%;
            font-size: 14px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .bot-msg {
            background: #ffffff;
            align-self: flex-start;
        }

        .user-msg {
            background: #dcf8c6;
            align-self: flex-end;
        }

        .chat-img {
            max-width: 100%;
            border-radius: 8px;
            display: block;
            margin-top: 5px;
        }

        #preview-box {
            display: none;
            padding: 10px;
            background: #fff;
            border-top: 2px solid #075e54;
            text-align: center;
            position: relative;
        }

        #preview-img {
            max-height: 100px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .del-btn {
            position: absolute;
            top: 5px;
            right: 15px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            padding: 2px 7px;
            font-weight: bold;
        }

        .input-area {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
        }

        #user-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }

        .icon-btn {
            cursor: pointer;
            font-size: 22px;
            border: none;
            background: none;
            color: #075e54;
            margin: 0 8px;
        }

        #image-input {
            display: none;
        }
    </style>
</head>

<body>

    <div class="header">Support Chat</div>

    <div id="chat-window">
        <div id="msg-list">
            <div class="msg bot-msg">Welcome! Please select an image or type a message to start.</div>
        </div>
    </div>

    <div id="preview-box">
        <button class="del-btn" onclick="clearPreview()">×</button>
        <img id="preview-img" src="">
    </div>

    <div class="input-area">
        <label for="image-input" class="icon-btn">📷</label>
        <input type="file" id="image-input" accept="image/*">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn" class="icon-btn" onclick="handleSend()">➤</button>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const msgList = document.getElementById('msg-list');
        const uInput = document.getElementById('user-input');
        const iInput = document.getElementById('image-input');
        const pBox = document.getElementById('preview-box');
        const pImg = document.getElementById('preview-img');

        let currentImg = null;

        iInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImg = ev.target.result;
                    pImg.src = currentImg;
                    pBox.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        function clearPreview() {
            currentImg = null;
            pBox.style.display = 'none';
            iInput.value = "";
        }

        function addMessage(text, type, isImg = false) {
            const div = document.createElement('div');
            div.className = `msg ${type}-msg`;
            if (isImg) {
                const img = document.createElement('img');
                img.src = text;
                img.className = 'chat-img';
                div.appendChild(img);
            } else {
                div.innerText = text;
            }
            msgList.appendChild(div);

            // Auto-scroll to the bottom when a new message arrives
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        function handleSend() {
            const val = uInput.value.trim();
            if (!val && !currentImg) return;

            if (currentImg) {
                addMessage(currentImg, 'user', true);
                clearPreview();
            }
            if (val) {
                addMessage(val, 'user');
                uInput.value = '';
            }

            // Simple bot auto-response
            setTimeout(() => addMessage("Message received! We will get back to you soon.", 'bot'), 1000);
        }

        // --- Handle Enter Key ---
        uInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSend();
            }
        });
    </script>

</body>

</html>
